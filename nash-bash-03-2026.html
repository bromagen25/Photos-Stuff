<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nash Bash 03/2026 - Lexington Black Widows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom styles for smooth transitions and font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        .gallery-image {
            transition: transform 0.2s ease-in-out;
        }
        .gallery-image:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
        .modal {
            background-color: rgba(0, 0, 0, 0.9);
            transition: opacity 0.3s ease-in-out;
        }
        .modal-content {
            max-height: 90vh;
            max-width: 90vw;
            object-fit: contain;
            cursor: pointer;
        }
        /* Spinner animation */
        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ffffff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            z-index: 50;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Active button styling */
        .nav-button.active {
            background-color: #4a5568;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-8">

    <header class="w-full max-w-7xl flex justify-between items-center mb-12 p-4 bg-gray-900 rounded-xl shadow-lg">
        <h1 id="mainTitle" class="text-3xl sm:text-4xl font-extrabold text-red-600">Nash Bash 03/2026</h1>
        <nav class="flex space-x-4">
            <a href="index.html" class="flex items-center space-x-2 px-4 py-2 bg-red-700 text-white rounded-lg hover:bg-red-800 transition duration-300 transform hover:scale-105">
                <i class="fas fa-home"></i>
                <span class="hidden sm:inline">Home</span>
            </a>
        </nav>
    </header>

    <nav class="mb-10 p-4 bg-white rounded-xl shadow-xl flex flex-wrap justify-center gap-4">
        <button class="nav-button bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1" data-gallery="Team &amp; Warmups">Team &amp; Warmups</button>
        <button class="nav-button bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1" data-gallery="LBW vs Toledo Celtics">LBW vs Toledo Celtics</button>
        <button class="nav-button bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1" data-gallery="LBW vs St. Louis Sabers">LBW vs St. Louis Sabers</button>
        <button class="nav-button bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1" data-gallery="Chicago Rugby Club">Chicago Rugby Club</button>
        <button class="nav-button bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1" data-gallery="Team Photos">Team Photos</button>
        <a href="videos.html#nash-bash-2026" class="flex items-center space-x-2 bg-red-700 hover:bg-red-800 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1">
            <i class="fas fa-video"></i>
            <span>Videos &amp; Social</span>
        </a>
    </nav>

    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-6 max-w-7xl mx-auto bg-white rounded-xl shadow-2xl">
    </div>

    <div id="imageModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal opacity-0">
        <div class="relative flex flex-col items-center justify-center w-full h-full">
            <button id="closeModal" class="absolute top-4 right-4 text-white text-4xl p-2 rounded-full bg-gray-700 bg-opacity-50 hover:bg-opacity-75 focus:outline-none z-55" aria-label="Close image modal">
                <i class="fas fa-times"></i>
            </button>

            <div id="loadingSpinner" class="spinner absolute z-50 hidden"></div>

            <img id="modalImage" src="" alt="Gallery Image" class="modal-content rounded-lg shadow-lg">

            <div id="clickToSourceText" class="absolute bottom-8 text-white text-lg bg-black bg-opacity-50 px-4 py-2 rounded-lg hidden transition-opacity duration-300 opacity-0">
                Click image to view host page
            </div>
        </div>
    </div>

    <script>
        // Data structure containing all sub-galleries for the event
        // Add image URLs here once available
        const subGalleries = {
            "Team & Warmups": [
                "https://i.postimg.cc/wMt9LfHC/DSC-6459.jpg",
                "https://i.postimg.cc/63b97Jsm/DSC-6462.jpg",
                "https://i.postimg.cc/Jnzr47FC/DSC-6463.jpg",
                "https://i.postimg.cc/k59MzvFF/DSC-6464.jpg",
                "https://i.postimg.cc/CKNMgnmC/DSC-6465.jpg"
            ],
            "LBW vs Toledo Celtics": [
                "https://i.postimg.cc/50FK8vpK/DSC-6546.jpg",
                "https://i.postimg.cc/fbyrT1dT/DSC-6547.jpg",
                "https://i.postimg.cc/9fkN41Pf/DSC-6548.jpg",
                "https://i.postimg.cc/7ZxRj5Y1/DSC-6549.jpg",
                "https://i.postimg.cc/SKPtXVLf/DSC-6550.jpg"
            ],
            "LBW vs St. Louis Sabers": [
                "https://i.postimg.cc/3JWqFzwc/DSC-7066.jpg",
                "https://i.postimg.cc/PfScZddN/DSC-7067.jpg",
                "https://i.postimg.cc/7hZWcWnw/DSC-7068.jpg",
                "https://i.postimg.cc/brVBj96X/DSC-7069.jpg",
                "https://i.postimg.cc/MKXLmgTW/DSC-7070.jpg"
            ],
            "Chicago Rugby Club": [
                "https://i.postimg.cc/XYMwxfcH/DSC-7777.jpg",
                "https://i.postimg.cc/631ZZnp6/DSC-7778.jpg",
                "https://i.postimg.cc/Sst99Cxq/DSC-7779.jpg",
                "https://i.postimg.cc/HxPMMXkx/DSC-7780.jpg",
                "https://i.postimg.cc/ZnGy7mND/DSC-7781.jpg"
            ],
            "Team Photos": [
                "https://i.postimg.cc/8zK3NGqc/DSC-8970.jpg",
                "https://i.postimg.cc/FHWqNvwC/DSC-8971.jpg",
                "https://i.postimg.cc/YCqV50D1/DSC-8972.jpg",
                "https://i.postimg.cc/8Pb9XM4H/DSC-8973.jpg",
                "https://i.postimg.cc/nLNP9kF4/DSC-8974.jpg"
            ]
        };

        // DOM element references
        const galleryDiv = document.getElementById('gallery');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const closeModalBtn = document.getElementById('closeModal');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const clickToSourceText = document.getElementById('clickToSourceText');
        const navButtons = document.querySelectorAll('.nav-button');

        let currentImageUrls = [];
        let currentImageIndex = 0;

        /**
         * Loads and displays the specified sub-gallery.
         * @param {string} subGalleryName - The name/key of the sub-gallery to display.
         */
        function loadSubGallery(subGalleryName) {
            galleryDiv.innerHTML = ''; // Clear current gallery
            currentImageUrls = subGalleries[subGalleryName] || [];

            if (currentImageUrls.length === 0) {
                galleryDiv.innerHTML = '<p class="col-span-full text-center text-gray-400 text-lg py-12">Photos coming soon! Check back later.</p>';
            } else {
                currentImageUrls.forEach((url, index) => {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'relative overflow-hidden rounded-lg shadow-md bg-gray-200';

                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = `Gallery image ${index + 1}`;
                    img.className = 'gallery-image w-full h-48 object-cover';
                    img.loading = 'lazy';
                    img.onerror = function() {
                        this.src = 'https://placehold.co/400x300/cccccc/333333?text=Image+Error';
                        this.alt = 'Image failed to load';
                    };

                    imgContainer.appendChild(img);
                    imgContainer.addEventListener('click', () => openModal(index));
                    galleryDiv.appendChild(imgContainer);
                });
            }

            // Update active button styling
            navButtons.forEach(button => {
                if (button.dataset.gallery === subGalleryName) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        /**
         * Opens the image modal and displays the image at the given index.
         * @param {number} index - The index of the image to display.
         */
        function openModal(index) {
            currentImageIndex = index;

            loadingSpinner.classList.remove('hidden');
            modalImage.classList.add('hidden');
            clickToSourceText.classList.add('hidden', 'opacity-0');

            modalImage.src = '';

            setTimeout(() => {
                modalImage.src = currentImageUrls[currentImageIndex];
                modalImage.onerror = function() {
                    this.src = 'https://placehold.co/800x600/cccccc/333333?text=Image+Error';
                    this.alt = 'Image failed to load';
                    loadingSpinner.classList.add('hidden');
                    modalImage.classList.remove('hidden');
                };

                modalImage.onload = function() {
                    loadingSpinner.classList.add('hidden');
                    modalImage.classList.remove('hidden');
                    setTimeout(() => {
                        clickToSourceText.classList.remove('hidden');
                        setTimeout(() => clickToSourceText.classList.remove('opacity-0'), 10);
                    }, 200);
                };
            }, 50);

            imageModal.classList.remove('hidden');
            setTimeout(() => {
                imageModal.classList.remove('opacity-0');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        /**
         * Closes the image modal.
         */
        function closeModal() {
            imageModal.classList.add('opacity-0');
            setTimeout(() => {
                imageModal.classList.add('hidden');
                modalImage.src = '';
                document.body.style.overflow = '';
            }, 300);
        }

        /**
         * Displays the next image in the modal.
         */
        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentImageUrls.length;
            openModal(currentImageIndex);
        }

        /**
         * Displays the previous image in the modal.
         */
        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + currentImageUrls.length) % currentImageUrls.length;
            openModal(currentImageIndex);
        }

        // Event Listeners for modal
        closeModalBtn.addEventListener('click', closeModal);

        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) {
                closeModal();
            }
        });

        modalImage.addEventListener('click', (e) => {
            e.stopPropagation();
            if (modalImage.src && !modalImage.classList.contains('hidden')) {
                const parts = modalImage.src.split('/');
                const imageId = parts[parts.length - 2];

                if (imageId && imageId.length > 0) {
                    const postimgPageUrl = `https://postimg.cc/${imageId}`;
                    window.open(postimgPageUrl, '_blank');
                } else {
                    window.open(modalImage.src, '_blank');
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!imageModal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') {
                    showNextImage();
                } else if (e.key === 'ArrowLeft') {
                    showPrevImage();
                } else if (e.key === 'Escape') {
                    closeModal();
                }
            }
        });

        // Touch event listeners for swiping
        let touchStartX = 0;
        let touchEndX = 0;

        modalImage.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        modalImage.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                showNextImage();
            } else if (touchEndX > touchStartX + swipeThreshold) {
                showPrevImage();
            }
        });

        // Initialize gallery on page load
        document.addEventListener('DOMContentLoaded', () => {
            navButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const galleryName = button.dataset.gallery;
                    loadSubGallery(galleryName);
                });
            });

            // Load the first tab by default
            const defaultButton = document.querySelector('.nav-button[data-gallery="Team & Warmups"]');
            if (defaultButton) {
                defaultButton.click();
            }
        });
    </script>
</body>
</html>
